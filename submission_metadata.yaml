# Redrob Hackathon — Submission Metadata Template
#
# Copy this file to your repo root as `submission_metadata.yaml` and fill it in.
# The fields here should match what you submit via the portal at upload time.
# Stage 3 review uses this file to verify your portal metadata.

# ============================================================================
# Team identity
# ============================================================================
team_name: "talent-lens-ai-team"  # Used in leaderboard and announcements

primary_contact:
  name: "Mohd Ibadullah"
  email: "mohdibadullah13@gmail.com"   # Used for all organizer communication
  phone: "+91 9030605408"        # Used for top-50 / top-10 outreach

team_members:
  - name: "Mohd Ibadullah"
    email: "mohdibadullah13@gmail.com"
    role: "ML Engineer"          # Optional, e.g. "Team Lead", "Backend", "Data"

# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/mohd-ibadullah/TalentLensAI"
# Required. Must be reachable. Private repos OK if you can grant organizer
# access at Stage 3.

sandbox_link: "https://talentlensai-nxrk7zxjmaxvnwnubyvz7n.streamlit.app"
# Required. A working hosted environment where the ranker can be run.

reproduce_command: |
  # One-time setup (with network, ~15 min):
  pip install -r requirements.txt && python src/download_models.py && python src/precompute_embeddings.py
  # Ranking (offline, ~30s warm / <5 min with setup):
  python src/run_pipeline_full.py --candidates ./candidates.jsonl --out ./outputs/mohd_ibadullah.csv
# The single command that produces submission.csv from candidates.jsonl.
# Should run end-to-end within 5 minutes on CPU with 16GB RAM and no network.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Local Windows PC"                  # Or: "MacBook Pro M2", "AWS EC2 c5.4xlarge", etc.
  cpu_cores: 8                                  # Number of CPU cores used
  ram_gb: 16                                    # Available RAM in GB
  python_version: "3.12.10"                      # python --version
  os: "Windows 11"                              # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: true               # Embeddings precomputed offline (one-time, allowed before ranking)
  pre_computation_time_minutes: 15               # python src/precompute_embeddings.py on 100K profiles (CPU)

# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"        # e.g. for architecture discussion, code review
  - "Cursor"        # e.g. for refactoring

ai_usage_summary: |
  Used Gemini for code optimization, debugging dependency versions (Streamlit/Starlette),
  and setting up the modular architecture. No candidate data was fed to external APIs.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  TalentLens AI uses a 6-stage hybrid ranking engine on 100K candidates.
  Stage 1: BM25 lexical + BGE dense retrieval (~1,500 union). Stage 2: continuous
  honeypot trap detector (title/skill/career/timeline checks). Stage 3: weighted
  feature scoring (40/20/20/10 semantic/skills/title/signals). Stage 4: cross-encoder
  rerank on top 150. Stage 5: profile-specific rule-based reasoning (offline).
  Precomputed embeddings required (one-time setup via setup.ps1). Ranking runs offline
  in ~30s on CPU with 16GB RAM budget.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true         # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduction_command runs end-to-end
