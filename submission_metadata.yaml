# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Local Windows PC"                  # Or: "MacBook Pro M2", "AWS EC2 c5.4xlarge", etc.
  cpu_cores: 8                                  # Number of CPU cores used
  ram_gb: 16                                    # Available RAM in GB
  python_version: "3.12.10"                      # python --version
  os: "Windows 11"                              # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: false               # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 0               # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"        # e.g. for architecture discussion, code review
  - "Cursor"        # e.g. for refactoring

ai_usage_summary: |
  Used Gemini for code optimization, debugging dependency versions (Streamlit/Starlette),
  and setting up the modular architecture. No candidate data was fed to external APIs.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  TalentLens AI uses a 6-stage ranking engine designed for both speed and precision.
  It filters 100,000 candidates to the top 1,000 using a lightweight BM25 pass.
  A honeypot trap detector checks profile consistency (detecting summary templates, 
  title-skill mismatches, and duplicated career histories) to heavily penalize
  decoy candidates. Semantic similarities are calculated using a local
  BAAI/bge-base-en-v1.5 transformer model (768-dim, CLS-pooling with instruction-tuned 
  query prefixes) over enriched candidate texts (title + headline + summary + skills + 
  career titles). Sub-scores (similarity, skill match via RapidFuzz, experience, 
  and Redrob signals) are aggregated and sorted with a rounded lexicographical
  tie-breaker.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true         # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduction_command runs end-to-end
